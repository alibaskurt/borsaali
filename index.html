<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BorsaAli</title>
<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center}
.card {background:#1e293b;margin:20px;padding:20px;border-radius:15px}
</style>
</head>
<body>

<h1>BorsaAli</h1>

<div class="card">
<h2>Altın Ons (XAUUSD)</h2>
<div class="tradingview-widget-container">
<div id="gold_chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
"width": "100%",
"height": 400,
"symbol": "OANDA:XAUUSD",
"interval": "5",
"timezone": "Europe/Istanbul",
"theme": "dark",
"style": "1",
"locale": "tr",
"container_id": "gold_chart"
});
</script>
</div>
</div>

<div class="card">
<h2>Gümüş Ons (XAGUSD)</h2>
<div class="tradingview-widget-container">
<div id="silver_chart"></div>
<script>
new TradingView.widget({
"width": "100%",
"height": 400,
"symbol": "OANDA:XAGUSD",
"interval": "5",
"timezone": "Europe/Istanbul",
"theme": "dark",
"style": "1",
"locale": "tr",
"container_id": "silver_chart"
});
</script>
</div>
</div>

<div class="card">
<h2>USDTRY</h2>
<div class="tradingview-widget-container">
<div id="usd_chart"></div>
<script>
new TradingView.widget({
"width": "100%",
"height": 400,
"symbol": "FX:USDTRY",
"interval": "5",
"timezone": "Europe/Istanbul",
"theme": "dark",
"style": "1",
"locale": "tr",
"container_id": "usd_chart"
});
</script>
</div>
</div>

</body>
</html>
