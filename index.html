<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BorsaAli</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}
.card{
    background:#1e293b;
    margin:20px;
    padding:20px;
    border-radius:15px;
}
.prediction{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>BorsaAli</h1>

<div class="card">
<h2>Altın Ons (XAUUSD)</h2>
<div id="goldChart" style="height:400px;"></div>
<div class="prediction" id="goldProbability">Hesaplanıyor...</div>
</div>

<div class="card">
<h2>Gümüş Ons (XAGUSD)</h2>
<div id="silverChart" style="height:400px;"></div>
<div class="prediction" id="silverProbability">Hesaplanıyor...</div>
</div>

<div class="card">
<h2>USDTRY</h2>
<div id="usdtryChart" style="height:400px;"></div>
</div>

<script>
new TradingView.widget({
    "container_id": "goldChart",
    "symbol": "OANDA:XAUUSD",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "locale": "tr",
    "hide_top_toolbar": false,
    "allow_symbol_change": false
});

new TradingView.widget({
    "container_id": "silverChart",
    "symbol": "OANDA:XAGUSD",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "locale": "tr",
    "hide_top_toolbar": false,
    "allow_symbol_change": false
});

new TradingView.widget({
    "container_id": "usdtryChart",
    "symbol": "FX:USDTRY",
    "interval": "5",
    "theme": "dark",
    "style": "1",
    "locale": "tr",
    "hide_top_toolbar": false,
    "allow_symbol_change": false
});

const apiKey = "goldapi-z6lx8smm16unfs-io";

let goldPrices = [];
let silverPrices = [];

async function getPrice(symbol){
    const res = await fetch(`https://www.goldapi.io/api/${symbol}/USD`,{
        headers:{"x-access-token":apiKey}
    });
    const data = await res.json();
    return data.price;
}

function calculateProbability(arr){
    if(arr.length < 5) return "Veri toplanıyor...";

    let first = arr[0];
    let last = arr[arr.length-1];
    let diff = last - first;
    let percent = (diff / first) * 100;

    if(percent > 0){
        return "%" + percent.toFixed(2) + " YUKARI olasılık";
    } else {
        return "%" + Math.abs(percent).toFixed(2) + " AŞAĞI olasılık";
    }
}

async function updateData(){
    try{
        let gold = await getPrice("XAU");
        let silver = await getPrice("XAG");

        goldPrices.push(gold);
        silverPrices.push(silver);

        if(goldPrices.length > 20) goldPrices.shift();
        if(silverPrices.length > 20) silverPrices.shift();

        document.getElementById("goldProbability").innerText =
            calculateProbability(goldPrices);

        document.getElementById("silverProbability").innerText =
            calculateProbability(silverPrices);

    }catch(e){
        console.log("Hata:", e);
    }
}

setInterval(updateData, 10000);
updateData();
</script>

</body>
</html>
